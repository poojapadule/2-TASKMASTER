<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskMaster — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-bg">
    <div class="noise"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <main class="auth-container">
    <div class="auth-card">
      <div class="brand">
        <div class="logo-mark">T</div>
        <span class="brand-name">TaskMaster</span>
      </div>

      <!-- Tab Switcher -->
      <div class="tab-switcher">
        <button class="tab active" data-tab="login">Sign In</button>
        <button class="tab" data-tab="register">Register</button>
        <div class="tab-slider"></div>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active" novalidate>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />
          <span class="field-error" id="loginEmailErr"></span>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrap">
            <input type="password" id="loginPassword" placeholder="Enter password" required />
            <button type="button" class="toggle-pw" onclick="togglePW('loginPassword', this)">👁</button>
          </div>
          <span class="field-error" id="loginPasswordErr"></span>
        </div>
        <div class="demo-hint">
          <span>Demo:</span> pooja@taskmaster.com / demo1234
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">
          <span>Sign In</span>
          <div class="btn-loader hidden"></div>
        </button>
        <div class="form-error hidden" id="loginError"></div>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form" novalidate>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Your name" required />
          <span class="field-error" id="regNameErr"></span>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required />
          <span class="field-error" id="regEmailErr"></span>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrap">
            <input type="password" id="regPassword" placeholder="Min 6 characters" required />
            <button type="button" class="toggle-pw" onclick="togglePW('regPassword', this)">👁</button>
          </div>
          <span class="field-error" id="regPasswordErr"></span>
        </div>
        <button type="submit" class="btn-primary" id="registerBtn">
          <span>Create Account</span>
          <div class="btn-loader hidden"></div>
        </button>
        <div class="form-error hidden" id="registerError"></div>
      </form>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
